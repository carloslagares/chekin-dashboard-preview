<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chekin — Welcome variants</title>
<link rel="stylesheet" href="ds/colors_and_type.css">
<style>
  :root{
    --nav:#161643;
    --ink:#161643;
    --ink2:#6B6B95;
    --ink3:#9696B9;
    --line:#E5E6EE;
    --line2:#DEDEEB;
    --bg:#FDFDFF;
    --blue:#385BF8;
    --blue-light:#EFF6FF;
    --blue-chip:#F0F3FF;
    --success:#0F9F80;
    --success-bg:#E8FCF7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-primary);color:var(--ink)}

  /* Variant switcher — a compact grouped dropdown */
  .switcher{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:100}

  .trigger{
    appearance:none;cursor:pointer;
    display:flex;align-items:center;gap:10px;
    height:44px;padding:0 8px 0 8px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:999px;
    box-shadow:0 8px 24px rgba(26,148,255,.12),0 2px 4px rgba(22,22,67,.04);
    font:600 13px var(--font-primary);color:var(--ink);
    transition:box-shadow .15s;
  }
  .trigger:hover{box-shadow:0 10px 28px rgba(26,148,255,.18),0 2px 4px rgba(22,22,67,.06)}
  .trigger .cur-v{font:700 10px var(--font-primary);padding:3px 8px;border-radius:999px;background:var(--blue);color:#fff}
  .trigger .cur-label{padding:0 2px}
  .trigger .gen{font:800 9px var(--font-primary);padding:2px 7px;border-radius:5px;letter-spacing:.06em}
  .trigger .gen.g47{background:rgba(22,22,67,.07);color:var(--ink2)}
  .trigger .gen.g48{background:#D5F5EC;color:var(--success)}
  .trigger .gen.gf5{background:#EEE9FF;color:#6C4CF1}
  .trigger .chev{width:16px;height:16px;stroke:var(--ink2);fill:none;stroke-width:2;margin-right:6px;transition:transform .2s}
  .switcher.open .trigger .chev{transform:rotate(180deg)}

  .menu{
    position:absolute;top:52px;left:50%;transform:translateX(-50%) translateY(-6px);
    width:300px;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line);border-radius:16px;
    box-shadow:0 16px 40px rgba(22,22,67,.16),0 2px 6px rgba(22,22,67,.06);
    padding:8px;
    opacity:0;visibility:hidden;pointer-events:none;
    transition:opacity .16s, transform .16s, visibility .16s;
  }
  .switcher.open .menu{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}

  .menu .group{display:flex;align-items:center;gap:8px;padding:10px 10px 6px;font:700 10px var(--font-primary);text-transform:uppercase;letter-spacing:.08em;color:var(--ink3)}
  .menu .group .pill{font:800 9px var(--font-primary);padding:2px 7px;border-radius:5px;letter-spacing:.06em}
  .menu .group .pill.g47{background:rgba(22,22,67,.07);color:var(--ink2)}
  .menu .group .pill.g48{background:#D5F5EC;color:var(--success)}
  .menu .group .pill.gf5{background:#EEE9FF;color:#6C4CF1}
  .menu .group .ln{flex:1;height:1px;background:var(--line)}

  .opt{
    width:100%;appearance:none;border:none;background:transparent;cursor:pointer;
    display:flex;align-items:center;gap:11px;
    padding:9px 10px;border-radius:10px;
    font:600 13.5px var(--font-primary);color:var(--ink);text-align:left;
    transition:background .12s;
  }
  .opt:hover{background:var(--blue-chip)}
  .opt .v{font:700 10px var(--font-primary);padding:3px 7px;border-radius:999px;background:rgba(22,22,67,.08);color:var(--ink2);flex-shrink:0}
  .opt .t{flex:1;min-width:0}
  .opt .new{font:800 9px var(--font-primary);padding:2px 7px;border-radius:5px;background:#D5F5EC;color:var(--success);letter-spacing:.06em}
  .opt .new.f5{background:#EEE9FF;color:#6C4CF1}
  .opt .check{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2.6;opacity:0}
  .opt.active{background:var(--blue-light)}
  .opt.active .v{background:var(--blue);color:#fff}
  .opt.active .check{opacity:1}

  .stage{position:relative;min-height:100vh}
  .variant{display:none}
  .variant.active{display:block}
  iframe.variant{width:100%;border:none;display:none;background:var(--bg)}
  iframe.variant.active{display:block}
</style>
</head>
<body>

<div class="switcher" id="switcher">
  <button class="trigger" id="trigger" aria-haspopup="menu" aria-expanded="false">
    <span class="cur-v" id="curV">V1</span>
    <span class="cur-label" id="curLabel">Original</span>
    <span class="gen g47" id="curGen">4.7</span>
    <svg class="chev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
  </button>

  <div class="menu" id="menu" role="menu">
    <div class="group"><span class="pill g47">4.7</span>Original<span class="ln"></span></div>
    <button class="opt active" data-v="v1" data-label="Original" data-gen="47" role="menuitem"><span class="v">V1</span><span class="t">Original</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="v2" data-label="Today's agenda" data-gen="47" role="menuitem"><span class="v">V2</span><span class="t">Today's agenda</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="v3" data-label="Compliance first" data-gen="47" role="menuitem"><span class="v">V3</span><span class="t">Compliance first</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="v4" data-label="AI assistant" data-gen="47" role="menuitem"><span class="v">V4</span><span class="t">AI assistant</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="v5" data-label="Weekly calendar" data-gen="47" role="menuitem"><span class="v">V5</span><span class="t">Weekly calendar</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="v6" data-label="Mobile" data-gen="47" role="menuitem"><span class="v">V6</span><span class="t">📱 Mobile</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>

    <div class="group"><span class="pill g48">4.8</span>Refined · Opus<span class="ln"></span></div>
    <button class="opt" data-v="v7" data-label="Refined" data-gen="48" role="menuitem"><span class="v">V7</span><span class="t">Refined home</span><span class="new">4.8</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>

    <div class="group"><span class="pill gf5">Fable</span>Claude 5<span class="ln"></span></div>
    <button class="opt" data-v="v8" data-label="Fable refine" data-gen="f5" role="menuitem"><span class="v">V8</span><span class="t">Fable refine</span><span class="new f5">NEW</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="onb" data-label="Onboarding" data-gen="f5" role="menuitem"><span class="v">OB</span><span class="t">Onboarding</span><span class="new f5">NEW</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
    <button class="opt" data-v="v9f" data-label="First run" data-gen="f5" role="menuitem"><span class="v">FR</span><span class="t">First-run home</span><span class="new f5">NEW</span><svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></button>
  </div>
</div>

<div class="stage">
  <iframe class="variant" data-v="v1" data-src="variants/v1_original.html" title="V1 Original"></iframe>
  <iframe class="variant" data-v="v2" data-src="variants/v2_agenda.html" title="V2 Today's agenda"></iframe>
  <iframe class="variant" data-v="v3" data-src="variants/v3_compliance.html" title="V3 Compliance first"></iframe>
  <iframe class="variant" data-v="v4" data-src="variants/v4_ai.html" title="V4 AI assistant"></iframe>
  <iframe class="variant" data-v="v5" data-src="variants/v5_calendar.html" title="V5 Weekly calendar"></iframe>
  <iframe class="variant" data-v="v6" data-src="variants/v6_mobile.html" title="V6 Mobile preview"></iframe>
  <iframe class="variant" data-v="v7" data-src="variants/v7_opus48.html" title="V7 Refined — Opus 4.8"></iframe>
  <iframe class="variant" data-v="v8" data-src="variants/v8_fable.html" title="V8 Fable refine — Fable 5"></iframe>
  <iframe class="variant" data-v="onb" data-src="onboarding.html" title="Onboarding — Fable 5"></iframe>
  <iframe class="variant" data-v="v9f" data-src="variants/v9_firstrun.html" title="First-run home — Fable 5"></iframe>
</div>

<script>
  function sizeFrames(){
    document.querySelectorAll('iframe.variant').forEach(function(f){ f.style.height = window.innerHeight + 'px'; });
  }
  sizeFrames();
  window.addEventListener('resize', sizeFrames);

  var switcher = document.getElementById('switcher');
  var trigger  = document.getElementById('trigger');
  var menu     = document.getElementById('menu');
  var curV     = document.getElementById('curV');
  var curLabel = document.getElementById('curLabel');
  var curGen   = document.getElementById('curGen');

  // Deep-link via ?view=agenda|compliance|ai|calendar|refined (from sidebar)
  var VIEW_MAP = { agenda:'v2', compliance:'v3', ai:'v4', calendar:'v5', refined:'v7', mobile:'v6', fable:'v8', onboarding:'onb', firstrun:'v9f' };
  var urlView = new URLSearchParams(location.search).get('view');

  var LS = 'chekin_welcome_variant';

  function openMenu(){ switcher.classList.add('open'); trigger.setAttribute('aria-expanded','true'); }
  function closeMenu(){ switcher.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); }
  trigger.addEventListener('click', function(e){ e.stopPropagation(); switcher.classList.contains('open') ? closeMenu() : openMenu(); });
  document.addEventListener('click', function(e){ if(!switcher.contains(e.target)) closeMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });

  function activate(v){
    var opt = menu.querySelector('.opt[data-v="'+v+'"]');
    if(!opt) return;
    menu.querySelectorAll('.opt').forEach(function(o){ o.classList.toggle('active', o===opt); });
    document.querySelectorAll('iframe.variant').forEach(function(f){
      var match = f.dataset.v === v;
      f.classList.toggle('active', match);
      if (match && !f.hasAttribute('src') && f.dataset.src) f.setAttribute('src', f.dataset.src);
    });
    // Update trigger label
    curV.textContent = v.toUpperCase();
    curLabel.textContent = opt.getAttribute('data-label');
    var gen = opt.getAttribute('data-gen');
    var GEN_LABEL = { '47':'4.7', '48':'4.8', 'f5':'Fable' };
    curGen.textContent = GEN_LABEL[gen] || gen;
    curGen.className = 'gen ' + (gen === '48' ? 'g48' : gen === 'f5' ? 'gf5' : 'g47');
    try{ localStorage.setItem(LS, v); }catch(err){}
  }

  // Initial: URL > localStorage > default V1
  var saved = null; try{ saved = localStorage.getItem(LS); }catch(err){}
  // Default landing is the dashboard (V8 Fable) — onboarding only via menu or ?view=onboarding
  var initial = (urlView && VIEW_MAP[urlView]) ? VIEW_MAP[urlView]
              : (saved && saved !== 'onb' && menu.querySelector('.opt[data-v="'+saved+'"]') ? saved : 'v8');
  activate(initial);

  menu.querySelectorAll('.opt').forEach(function(o){
    o.addEventListener('click', function(){ activate(o.dataset.v); closeMenu(); });
  });
</script>
</body>
</html>

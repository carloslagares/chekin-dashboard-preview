<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chekin Guest App — Opus 4.8 variants</title>
<link rel="stylesheet" href="../../ds/colors_and_type.css">
<style>
  :root{--nav:#161643;--ink:#161643;--ink2:#6B6B95;--line:#E5E6EE;--bg:#F6F7FC;--blue:#385CF8}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-primary);color:var(--ink)}
  .switcher{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:999px;padding:4px;display:flex;gap:2px;box-shadow:0 8px 24px rgba(56,92,248,.12),0 2px 4px rgba(22,22,67,.05)}
  .switcher button{appearance:none;border:none;background:transparent;padding:8px 14px;border-radius:999px;cursor:pointer;font:600 12.5px var(--font-primary);color:var(--ink2);display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
  .switcher button:hover{color:var(--ink);background:rgba(56,92,248,.06)}
  .switcher button.active{background:var(--blue);color:#fff;box-shadow:0 0 0 3px rgba(56,92,248,.2)}
  .switcher button .v{font:700 10px var(--font-primary);padding:1px 6px;border-radius:999px;background:rgba(22,22,67,.08);color:var(--ink2)}
  .switcher button.active .v{background:rgba(255,255,255,.25);color:#fff}
  .switcher button .new{font:700 9px var(--font-primary);padding:1px 6px;border-radius:4px;background:#D5F5EC;color:#0F9F80;letter-spacing:.06em;margin-left:2px}
  .switcher button.active .new{background:rgba(255,255,255,.25);color:#fff}
  .switcher .sep{width:1px;background:var(--line);margin:6px 4px}
  .switcher .badge48{font:800 9px var(--font-primary);padding:2px 7px;border-radius:5px;background:#161643;color:#fff;letter-spacing:.06em;margin-right:4px;display:inline-flex;align-items:center}
  .stage{position:relative;min-height:100vh}
  iframe.variant{width:100%;border:none;display:none;background:var(--bg)}
  iframe.variant.active{display:block}
</style>
</head>
<body>

<div class="switcher" role="tablist" aria-label="Guest App — Opus 4.8 variants">
  <span class="badge48">4.8</span>
  <button class="active" data-v="journey" role="tab"><span class="v">V1</span>Journey</button>
  <button data-v="tripguide" role="tab"><span class="v">V2</span>Trip Guide<span class="new">NEW</span></button>
  <button data-v="mobile" role="tab"><span class="v">V3</span>📱 Mobile</button>
  <div class="sep"></div>
  <button data-v="concierge" role="tab"><span class="v">4.7</span>Concierge</button>
  <button data-v="luggage" role="tab"><span class="v">4.7</span>Luggage</button>
</div>

<div class="stage">
  <iframe class="variant active" data-v="journey" src="journey.html" title="Journey (4.8)"></iframe>
  <iframe class="variant" data-v="tripguide" data-src="tripguide.html" title="Trip Guide (4.8)"></iframe>
  <iframe class="variant" data-v="mobile" data-src="mobile.html" title="Mobile (4.8)"></iframe>
  <iframe class="variant" data-v="concierge" data-src="../variants/v1_concierge.html" title="Concierge (4.7)"></iframe>
  <iframe class="variant" data-v="luggage" data-src="../variants/v6_loogage.html" title="Luggage (4.7)"></iframe>
</div>

<script>
  function sizeFrames(){ document.querySelectorAll('iframe.variant').forEach(function(f){ f.style.height = window.innerHeight + 'px'; }); }
  sizeFrames();
  window.addEventListener('resize', sizeFrames);

  var LS = 'chekin_guestapp_opus48';
  function activate(v){
    document.querySelectorAll('.switcher button').forEach(function(b){ b.classList.toggle('active', b.dataset.v === v); });
    document.querySelectorAll('iframe.variant').forEach(function(f){
      var match = f.dataset.v === v;
      f.classList.toggle('active', match);
      if (match && !f.hasAttribute('src') && f.dataset.src) f.setAttribute('src', f.dataset.src);
    });
    try{ localStorage.setItem(LS, v); }catch(e){}
  }
  var saved = null; try{ saved = localStorage.getItem(LS); }catch(e){}
  if (saved && document.querySelector('.switcher button[data-v="'+saved+'"]')) activate(saved);
  document.querySelectorAll('.switcher button').forEach(function(b){ b.addEventListener('click', function(){ activate(b.dataset.v); }); });
</script>
</body>
</html>

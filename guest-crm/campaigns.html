<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chekin — Guest CRM · Campaigns</title>
<link rel="stylesheet" href="../ds/colors_and_type.css">
<link rel="stylesheet" href="../ds/_sidebar.css">
<link rel="stylesheet" href="../ds/_agent.css">
<link rel="stylesheet" href="ds/_crm.css">
<style>
  .camp-name{display:flex;flex-direction:column;gap:2px;min-width:0}
  .camp-name .nm{font:600 14px/18px var(--font-primary);color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .camp-name .sb{font:400 12px/15px var(--font-primary);color:var(--text-gray-medium);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .perf{display:flex;flex-direction:column;gap:1px}
  .perf .a{font:600 13px var(--font-primary);color:var(--text-dark)}
  .perf .b{font:400 12px var(--font-primary);color:var(--text-success)}
</style>
</head>
<body>
<div class="app">
  <div id="sidebar-slot" data-nav="guest-crm"></div>
  <main>
    <header class="top">
      <div class="crumbs"><b>Guest CRM</b> <span class="sep">/</span> Campaigns</div>
      <span data-agent-trigger-slot style="margin-left:auto"></span>
      <button class="iconbtn" aria-label="Help"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2-3 4M12 17h.01"/></svg></button>
      <button class="iconbtn" aria-label="Notifications"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg><div class="pip"></div></button>
      <div class="user-av">MR</div>
    </header>

    <div class="page">
      <div id="crm-demo"></div>
      <div id="crm-subnav"></div>

      <!-- page head -->
      <div class="pagehead reveal">
        <div>
          <h1>Campaigns <span class="count" id="camp-count">0</span></h1>
          <div class="sub">AI-drafted, human-approved campaigns across email and WhatsApp. Nothing is sent until you approve and activate.</div>
        </div>
        <button class="btn-primary" id="new-campaign"></button>
      </div>

      <!-- KPIs -->
      <section class="kpis reveal" id="kpis" style="animation-delay:.05s"></section>

      <!-- status filter chips -->
      <div class="chips reveal" id="status-chips" style="animation-delay:.08s"></div>

      <!-- toolbar -->
      <div class="toolbar reveal" style="animation-delay:.1s">
        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search" placeholder="Search campaigns by name…">
        </div>
      </div>

      <!-- table -->
      <div class="table-wrap reveal" id="table-wrap" style="animation-delay:.12s">
        <div class="table-scroll">
          <table class="crm">
            <thead>
              <tr>
                <th>Campaign</th>
                <th>Status</th>
                <th>Channel</th>
                <th>Audience</th>
                <th>Deals</th>
                <th class="num">Est. revenue</th>
                <th>Performance</th>
                <th>Updated</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="crm-drawer-root"></div>

<script src="data/types.js"></script>
<script src="data/fixtures.js"></script>
<script src="services/crm-service.js"></script>
<script src="agent/agent.js"></script>
<script src="ds/_crm.js"></script>
<script src="../ds/_sidebar.js"></script>
<script src="../ds/_agent.js"></script>
<script>
(function(){
  var S = window.CRMService, I = CRM.icons;
  CRM.boot({ active:'campaigns' });

  // ---- new campaign button ----
  var newBtn = document.getElementById('new-campaign');
  newBtn.innerHTML = I.spark + ' New campaign';
  newBtn.addEventListener('click', function(){ location.href = 'campaign-new.html'; });

  // ---- state ----
  var STATUS_TABS = [
    { k:null, label:'All' },
    { k:'draft', label:'Draft' },
    { k:'needs_review', label:'Needs review' },
    { k:'approved', label:'Approved' },
    { k:'active', label:'Active' },
    { k:'paused', label:'Paused' },
    { k:'completed', label:'Completed' }
  ];
  var state = { status:null, q:'' };

  // ---- KPIs ----
  var all = S.getCampaigns();
  var activeCount = all.filter(function(c){ return c.status === 'active'; }).length;
  var draftReview = all.filter(function(c){ return c.status === 'draft' || c.status === 'needs_review'; }).length;
  var estRevenue = all.reduce(function(s,c){ return s + (c.revenueEstimate ? c.revenueEstimate.expectedRevenue : 0); }, 0);
  var realizedRevenue = all.reduce(function(s,c){ return s + (c.analytics ? c.analytics.revenue : 0); }, 0);
  var kpis = [
    { ic:'green', svg:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>', v:activeCount, l:'Active campaigns' },
    { ic:'amber', svg:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>', v:draftReview, l:'Drafts / review' },
    { ic:'violet', svg:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>', v:CRM.money(estRevenue), l:'Est. revenue' },
    { ic:'blue', svg:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>', v:CRM.money(realizedRevenue), l:'Realized revenue' }
  ];
  document.getElementById('kpis').innerHTML = kpis.map(function(k){
    return '<div class="kpi"><div class="ic '+k.ic+'"><svg viewBox="0 0 24 24">'+k.svg+'</svg></div><div><div class="v">'+k.v+'</div><div class="l">'+k.l+'</div></div></div>';
  }).join('');

  // ---- status chips ----
  function renderChips(){
    document.getElementById('status-chips').innerHTML = STATUS_TABS.map(function(t){
      var n = (t.k ? S.getCampaigns({ status:t.k }) : S.getCampaigns()).length;
      var on = state.status === t.k;
      return '<div class="chip'+(on?' active':'')+'" data-status="'+(t.k||'')+'">'+CRM.esc(t.label)+' <span class="count">'+n+'</span></div>';
    }).join('');
  }
  document.getElementById('status-chips').addEventListener('click', function(e){
    var chip = e.target.closest('.chip'); if(!chip) return;
    var v = chip.getAttribute('data-status');
    state.status = v || null;
    renderChips();
    render();
  });

  // ---- table rendering ----
  function dealsCell(c){
    var deals = c.deals || [];
    if(!deals.length) return '—';
    var first = CRM.esc(deals[0].title);
    return deals.length > 1 ? first + ' <span class="badge gray">+'+(deals.length-1)+'</span>' : first;
  }
  function audienceCell(c){
    if(c.consentCheck && c.consentCheck.eligibleSize != null) return c.consentCheck.eligibleSize + ' eligible';
    return '—';
  }
  function perfCell(c){
    if(!c.analytics) return '<span class="tiny">—</span>';
    return '<div class="perf"><span class="a">'+CRM.pct(c.analytics.conversionRate)+' conv</span><span class="b">'+CRM.money(c.analytics.revenue)+'</span></div>';
  }

  function getRows(){
    var rows = state.status ? S.getCampaigns({ status:state.status }) : S.getCampaigns();
    if(state.q){
      var q = state.q.toLowerCase();
      rows = rows.filter(function(c){ return (c.name||'').toLowerCase().indexOf(q) >= 0; });
    }
    return rows;
  }

  function render(){
    var rows = getRows();
    document.getElementById('camp-count').textContent = rows.length;
    var tbody = document.getElementById('rows');
    if(!rows.length){
      tbody.innerHTML = '<tr><td colspan="8" style="height:auto;padding:0">'+
        '<div class="empty">'+
          '<div class="ic"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>'+
          '<h3>No campaigns found</h3>'+
          '<p>'+(state.q || state.status ? 'No campaigns match your current filters. Try clearing the search or status filter.' : 'You have not created any campaigns yet. Let Vela draft your first one in seconds.')+'</p>'+
          '<button class="btn-primary" onclick="location.href=\'campaign-new.html\'">'+I.spark+' Create your first campaign</button>'+
        '</div>'+
      '</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function(c){
      var sub = c.content && c.content.subject ? c.content.subject : c.objective;
      return '<tr data-id="'+c.id+'">'+
        '<td><div class="camp-name"><span class="nm">'+CRM.esc(c.name)+'</span><span class="sb">'+CRM.esc(sub)+'</span></div></td>'+
        '<td>'+CRM.statusBadge(c.status)+'</td>'+
        '<td><span class="badge blue">'+CRM.esc(c.channel)+'</span></td>'+
        '<td>'+audienceCell(c)+'</td>'+
        '<td>'+dealsCell(c)+'</td>'+
        '<td class="num">'+(c.revenueEstimate ? CRM.money(c.revenueEstimate.expectedRevenue) : '—')+'</td>'+
        '<td>'+perfCell(c)+'</td>'+
        '<td>'+CRM.relDate(c.updatedAt)+'</td>'+
      '</tr>';
    }).join('');
  }

  document.getElementById('rows').addEventListener('click', function(e){
    var tr = e.target.closest('tr[data-id]'); if(!tr) return;
    location.href = 'campaign-detail.html?id=' + tr.getAttribute('data-id');
  });

  // ---- search ----
  document.getElementById('search').addEventListener('input', function(e){
    state.q = e.target.value.trim();
    render();
  });

  renderChips();
  render();
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chekin — Campaign Detail</title>
<link rel="stylesheet" href="../ds/colors_and_type.css">
<link rel="stylesheet" href="../ds/_sidebar.css">
<link rel="stylesheet" href="../ds/_agent.css">
<link rel="stylesheet" href="ds/_crm.css">
<style>
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media (max-width:1080px){.detail-grid{grid-template-columns:1fr}}
  .span2{grid-column:1 / -1}
  .metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media (max-width:720px){.metric-grid{grid-template-columns:repeat(2,1fr)}}
  .metric{border:1px solid var(--stroke-gray-lighter);border-radius:var(--radius-md);padding:13px 14px;background:#fff}
  .metric .v{font:700 20px/24px var(--font-primary);color:var(--text-dark);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .metric .l{font:500 12px var(--font-primary);color:var(--text-gray-dark);margin-top:3px}
  .rulewrap{display:flex;gap:8px;flex-wrap:wrap}
  .variant{border:1px solid var(--stroke-gray-lighter);border-radius:var(--radius-md);padding:12px 14px;background:var(--bg-neutral-light);margin-top:12px}
  .variant .vt{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  .variant .vt .nm{font:600 13.5px var(--font-primary);color:var(--text-dark)}
  .dealitem{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--stroke-gray-lighter)}
  .dealitem:last-child{border-bottom:none}
  .dealitem .ic{width:34px;height:34px;border-radius:9px;background:var(--bg-blue-light);color:var(--text-brand);display:grid;place-items:center;flex-shrink:0}
  .dealitem .ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
  .dealitem .tx{flex:1;min-width:0}
  .dealitem .tx .t{font:600 13.5px var(--font-primary);color:var(--text-dark);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dealitem .tx .r{font:400 12px/16px var(--font-primary);color:var(--text-gray-dark);margin-top:2px}
  .dealitem .pr{font:700 13px var(--font-primary);color:var(--text-dark);white-space:nowrap}
  .exrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px dashed var(--stroke-gray-light);font:500 13px var(--font-primary);color:var(--text-dark)}
  .exrow:last-child{border-bottom:none}
  .reclist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .reclist li{display:flex;gap:9px;font:500 13px/19px var(--font-primary);color:var(--text-gray-dark)}
  .reclist li .b{width:18px;height:18px;border-radius:6px;flex-shrink:0;display:grid;place-items:center;background:var(--bg-violet-light);color:var(--text-violet);margin-top:1px}
  .reclist li .b svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.4}
  .note-red{font:500 13px/19px var(--font-primary);color:var(--text-danger);background:var(--bg-danger-light);border:1px solid #FFC9D9;border-radius:var(--radius-md);padding:10px 12px}
</style>
</head>
<body>
<div class="app">
  <div id="sidebar-slot" data-nav="guest-crm"></div>
  <main>
    <header class="top">
      <div class="crumbs"><b>Guest CRM</b> <span class="sep">/</span> <a href="campaigns.html">Campaigns</a> <span class="sep">/</span> Detail</div>
      <span data-agent-trigger-slot style="margin-left:auto"></span>
      <button class="iconbtn" aria-label="Help"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2-3 4M12 17h.01"/></svg></button>
      <button class="iconbtn" aria-label="Notifications"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg><div class="pip"></div></button>
      <div class="user-av">MR</div>
    </header>

    <div class="page">
      <div id="crm-demo"></div>
      <div id="crm-subnav"></div>
      <div id="campaign-root"></div>
    </div>
  </main>
</div>

<div id="crm-drawer-root"></div>

<script src="data/types.js"></script>
<script src="data/fixtures.js"></script>
<script src="services/crm-service.js"></script>
<script src="agent/agent.js"></script>
<script src="ds/_crm.js"></script>
<script src="../ds/_sidebar.js"></script>
<script src="../ds/_agent.js"></script>
<script>
(function(){
  var S = window.CRMService, I = CRM.icons;
  CRM.boot({ active:'campaigns' });

  // ---- resolve campaign id from URL (fallback to first) ----
  var id = new URLSearchParams(location.search).get('id');
  var camp = id ? S.getCampaignById(id) : null;
  if(!camp){ var all = S.getCampaigns(); camp = all[0] || null; }
  var root = document.getElementById('campaign-root');

  if(!camp){
    root.innerHTML = '<div class="empty"><div class="ic">'+I.info+'</div><h3>Campaign not found</h3>'+
      '<p>We couldn\'t find that campaign. <a class="why" href="campaigns.html">Back to campaigns</a></p></div>';
    return;
  }
  var cid = camp.id;

  // ---------- small helpers ----------
  function card(title, bodyHtml, opts){
    opts = opts || {};
    return '<div class="card'+(opts.span?' span2':'')+'">'+
      '<div class="hd"><h3>'+(opts.icon?opts.icon+' ':'')+CRM.esc(title)+'</h3>'+(opts.act?'<div class="act">'+opts.act+'</div>':'')+'</div>'+
      '<div class="bd">'+bodyHtml+'</div></div>';
  }
  function kvRow(k,v){ return '<div class="row"><div class="k">'+CRM.esc(k)+'</div><div class="v">'+v+'</div></div>'; }
  function ruleChip(r){
    return '<span class="rule"><span class="f">'+CRM.esc(r.label||r.field)+'</span>'+
      (r.operator?'<span class="op">'+CRM.esc(String(r.operator).replace(/_/g,' '))+'</span>':'')+'</span>';
  }
  function consentTone(status){ return status==='passed'?'green':status==='warning'?'amber':'red'; }
  function consentLabel(status){ return ({passed:'Passed',warning:'Warning',failed:'Failed'}[status]||status); }

  // ---------- render ----------
  function render(){
    // re-read the live campaign each time (status mutates on approve/schedule)
    camp = S.getCampaignById(cid);
    var st = camp.status;
    var html = '';

    // ---- pagehead ----
    var actions = headActions(st);
    html += '<div class="pagehead">'+
      '<div><h1>'+CRM.esc(camp.name)+' '+CRM.statusBadge(st)+'</h1>'+
        '<div class="sub">'+CRM.esc(cap(camp.objective))+' · '+CRM.esc(cap(camp.channel))+' · created by '+CRM.esc(camp.createdBy)+'</div></div>'+
      (actions?'<div class="toolbar" style="flex:0 0 auto">'+actions+'</div>':'')+
    '</div>';

    // ---- approval banner ----
    html += approvalBanner(st);

    // ---- card grid ----
    var cards = '';
    cards += objectiveCard();
    cards += consentCard();
    cards += contentCard();
    cards += dealsCard();
    cards += revenueCard();
    cards += analyticsCard();
    cards += approvalTimelineCard();

    html += '<div class="detail-grid">'+cards+'</div>';

    root.innerHTML = html;
    wire();
  }

  // ---- head actions (status-dependent) ----
  function headActions(st){
    if(st==='draft' || st==='needs_review'){
      var cc = S.runCampaignConsentCheck(cid);
      var blocked = cc && cc.status==='failed';
      return '<button class="btn-primary" data-act="approve"'+(blocked?' disabled title="Consent check failed — cannot approve"':'')+'>'+I.check+' Approve campaign</button>'+
        '<button class="tbtn" data-act="edit">'+I.spark+' Edit in studio</button>';
    }
    if(st==='approved'){
      return '<button class="btn-primary" data-act="schedule">'+I.check+' Schedule / activate</button>'+
        '<button class="tbtn" data-act="edit">'+I.spark+' Edit in studio</button>';
    }
    if(st==='active' || st==='scheduled'){
      return '<button class="tbtn" data-act="pause"><svg viewBox="0 0 24 24"><path d="M10 4H6v16h4zM18 4h-4v16h4z"/></svg> Pause</button>'+
        '<button class="tbtn" data-act="duplicate"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Duplicate</button>';
    }
    if(st==='paused'){
      return '<button class="btn-primary" data-act="resume"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Resume</button>'+
        '<button class="tbtn" data-act="duplicate"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Duplicate</button>';
    }
    if(st==='completed'){
      return '<button class="tbtn" data-act="duplicate"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Run again</button>';
    }
    return '';
  }

  function approvalBanner(st){
    if(st!=='draft' && st!=='needs_review') return '';
    var cc = S.runCampaignConsentCheck(cid);
    var blocked = cc && cc.status==='failed';
    var d = blocked
      ? 'Approval is blocked because the consent check failed — there are no eligible recipients. Adjust the audience or channel before approving.'
      : 'Vela drafted this campaign but cannot send autonomously. Review the plan below and approve it before it can be scheduled or activated.';
    return '<div class="appbar" style="margin-bottom:4px"><div class="ic">'+I.spark+'</div>'+
      '<div class="tx"><div class="t">Human approval required</div><div class="d">'+CRM.esc(d)+'</div></div>'+
      '<button class="btn-primary" data-act="approve"'+(blocked?' disabled':'')+'>'+I.check+' Approve campaign</button></div>';
  }

  // ---- Objective & Audience ----
  function objectiveCard(){
    var trig = camp.trigger ? (cap(String(camp.trigger.type).replace(/_/g,' '))+(camp.trigger.value!=null?' · '+CRM.esc(String(camp.trigger.value)):'')) : '—';
    var sched = camp.schedule ? (camp.schedule.mode==='one_shot' ? 'One-shot'+(camp.schedule.sendAt?' · '+CRM.relDate(camp.schedule.sendAt):'') : cap(String(camp.schedule.mode).replace(/_/g,' '))) : '—';
    var rules = (camp.audienceRules||[]).map(ruleChip).join('') || '<span class="tiny">No audience rules.</span>';
    var cons = camp.consentCheck || {};
    var kv = '<div class="kv">'+
      kvRow('Objective', CRM.esc(cap(camp.objective)))+
      kvRow('Channel', '<span class="badge gray">'+CRM.esc(cap(camp.channel))+'</span>')+
      kvRow('Trigger', CRM.esc(trig))+
      kvRow('Schedule', CRM.esc(sched))+
    '</div>';
    var body = kv+
      '<div style="margin-top:14px"><div class="tiny" style="margin-bottom:8px">Audience rules</div><div class="rulewrap">'+rules+'</div></div>'+
      '<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">'+
        '<span class="badge green">'+(cons.eligibleSize!=null?cons.eligibleSize:'—')+' eligible</span>'+
        '<span class="badge red">'+(cons.excludedSize!=null?cons.excludedSize:0)+' excluded</span>'+
      '</div>';
    return card('Objective & Audience', body, { icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg>' });
  }

  // ---- Consent check ----
  function consentCard(){
    var cc = S.runCampaignConsentCheck(cid);
    var tone = consentTone(cc.status);
    var body = '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
      '<span class="badge '+tone+'"><span class="dot"></span>'+CRM.esc(consentLabel(cc.status))+'</span>'+
      '<span class="badge green">'+cc.eligibleSize+' eligible</span>'+
      '<span class="badge red">'+cc.excludedSize+' excluded</span>'+
      '<span class="badge gray">'+CRM.esc(cap(cc.channel))+'</span>'+
    '</div>';
    var ex = (cc.exclusions||[]);
    body += ex.length
      ? '<div style="margin-bottom:12px">'+ex.map(function(e){ return '<div class="exrow"><span>'+CRM.esc(e.reason)+'</span><span class="badge red">'+e.count+'</span></div>'; }).join('')+'</div>'
      : '<div class="tiny" style="margin-bottom:12px">No exclusions — every recipient has valid consent.</div>';
    if(cc.status==='failed'){
      body += '<div class="note-red" style="margin-bottom:12px">'+I.x+' Activation is blocked: no eligible recipients with consent.</div>';
    }
    if(cc.notes && cc.notes.length){
      body += '<ul class="reclist" style="margin-bottom:12px">'+cc.notes.map(function(n){ return '<li><span class="b">'+I.info+'</span><span>'+CRM.esc(n)+'</span></li>'; }).join('')+'</ul>';
    }
    body += CRM.aiBlock(CRM.esc(cc.reasoningSummary || (cc.notes||[]).join(' ')), {});
    return card('Consent check', body, { icon:'<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>' });
  }

  // ---- Content / email preview ----
  function contentCard(){
    var c = camp.content || {};
    var body = '<div class="mailprev"><div class="mh">'+
      '<div class="subj">'+CRM.esc(c.subject||'(no subject)')+'</div>'+
      '<div class="from">From Chekin · '+CRM.esc(c.previewText||'')+'</div></div>'+
      '<div class="mb">'+CRM.esc(c.body||'')+
        (c.ctaLabel?'<div><a class="cta">'+CRM.esc(c.ctaLabel)+'</a></div>':'')+
      '</div></div>';
    var meta = [];
    if(c.language) meta.push('<span class="badge gray">'+CRM.esc(c.language.toUpperCase())+'</span>');
    if(c.tone) meta.push('<span class="badge violet">'+CRM.esc(cap(c.tone))+'</span>');
    if(meta.length) body += '<div style="display:flex;gap:8px;margin-top:12px">'+meta.join('')+'</div>';
    var toks = (c.personalizationTokens||[]);
    if(toks.length){
      body += '<div style="margin-top:12px"><div class="tiny" style="margin-bottom:8px">Personalization tokens</div>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap">'+toks.map(function(t){ return '<span class="pill">{{'+CRM.esc(t)+'}}</span>'; }).join('')+'</div></div>';
    }
    var vars = (camp.variants||[]);
    if(vars.length){
      body += '<div style="margin-top:14px"><div class="tiny" style="margin-bottom:2px">A/B variants</div>'+
        vars.map(function(v){
          return '<div class="variant"><div class="vt"><span class="nm">'+CRM.esc(v.name)+'</span>'+
            '<span class="badge blue">'+(v.allocationPercentage!=null?v.allocationPercentage+'%':'—')+'</span></div>'+
            '<div class="tiny" style="color:var(--text-gray-dark)">'+CRM.esc((v.content&&v.content.subject)||'')+'</div></div>';
        }).join('')+'</div>';
    }
    return card('Content', body, { icon:'<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>' });
  }

  // ---- Deals ----
  function dealsCard(){
    var ds = (camp.deals||[]);
    if(!ds.length) return card('Attached deals', '<div class="tiny">No deals attached.</div>', { icon:dealIcon() });
    var body = ds.map(function(d){
      var full = S.getDealById(d.dealId) || {};
      var prov = full.providerType==='own'
        ? '<span class="badge blue">Own</span>'
        : '<span class="badge gray">'+CRM.esc(full.providerName||'Third party')+'</span>';
      var price = full.price!=null ? CRM.money(full.price, full.currency) : '';
      return '<div class="dealitem"><div class="ic"><svg viewBox="0 0 24 24"><path d="M20.6 8.4 12 17 3.4 8.4"/><path d="M3 8h18l-1 4H4z"/></svg></div>'+
        '<div class="tx"><div class="t">'+CRM.esc(d.title)+' '+prov+(full.providerType==='third_party'?'<span class="badge violet">3rd party</span>':'')+'</div>'+
        '<div class="r">'+CRM.esc(d.reason)+'</div></div>'+
        (price?'<div class="pr">'+price+'</div>':'')+'</div>';
    }).join('');
    return card('Attached deals', body, { icon:dealIcon() });
  }
  function dealIcon(){ return '<svg viewBox="0 0 24 24"><path d="M20.6 8.4 12 17 3.4 8.4"/><path d="M3 8h18l-1 4H4z"/></svg>'; }

  // ---- Revenue estimate ----
  function revenueCard(){
    var r = camp.revenueEstimate || {};
    var body = '<div class="metric-grid" style="grid-template-columns:repeat(3,1fr)">'+
      metric(r.expectedConversions!=null?r.expectedConversions:'—', 'Expected conversions')+
      metric(r.expectedRevenue!=null?CRM.money(r.expectedRevenue, r.currency):'—', 'Expected revenue')+
      metric(CRM.esc(r.currency||'EUR'), 'Currency')+
    '</div>';
    return card('Revenue estimate', body, { icon:'<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>' });
  }
  function metric(v,l){ return '<div class="metric"><div class="v">'+v+'</div><div class="l">'+CRM.esc(l)+'</div></div>'; }

  // ---- Analytics + AI summary ----
  function analyticsCard(){
    var a = camp.analytics;
    var body;
    if(!a){
      body = '<div class="empty" style="padding:28px 16px"><div class="ic">'+I.info+'</div>'+
        '<h3>No data yet</h3><p>This campaign has not run, so there are no performance metrics to show.</p></div>';
      return card('Performance analytics', body, { span:true, icon:perfIcon() });
    }
    body = '<div class="metric-grid">'+
      metric(a.sent, 'Sent')+
      metric(a.delivered, 'Delivered')+
      metric(a.opened, 'Opened')+
      metric(a.clicked, 'Clicked')+
    '</div>'+
    '<div class="metric-grid" style="margin-top:14px">'+
      metric(a.converted, 'Converted')+
      metric(CRM.money(a.revenue), 'Revenue')+
      metric(CRM.pct(a.conversionRate), 'Conversion rate')+
      metric(CRM.pct(a.clickRate), 'Click rate')+
    '</div>';
    if(a.unsubscribed!=null || a.failed!=null){
      body += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">'+
        '<span class="badge gray">'+(a.unsubscribed||0)+' unsubscribed</span>'+
        '<span class="badge gray">'+(a.failed||0)+' failed</span>'+
        (a.commission!=null?'<span class="badge green">'+CRM.money(a.commission)+' commission</span>':'')+
      '</div>';
    }
    var sum = S.summarizeCampaignPerformance(cid);
    if(sum && sum.headline){
      body += '<div style="margin-top:16px">'+CRM.aiBlock(CRM.esc(sum.headline), { why: sum.reasoningSummary })+'</div>';
      if(sum.recommendations && sum.recommendations.length){
        body += '<div style="margin-top:12px"><div class="tiny" style="margin-bottom:8px">Agent recommendations</div>'+
          '<ul class="reclist">'+sum.recommendations.map(function(rc){ return '<li><span class="b">'+I.spark+'</span><span>'+CRM.esc(rc)+'</span></li>'; }).join('')+'</ul></div>';
      }
    }
    return card('Performance analytics', body, { span:true, icon:perfIcon() });
  }
  function perfIcon(){ return '<svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'; }

  // ---- Approval history / activity log ----
  function approvalTimelineCard(){
    var apps = S.getApprovalsFor(cid);
    var body;
    if(!apps.length){
      body = '<div class="tiny">No approval activity recorded yet.</div>';
    } else {
      body = '<div class="timeline">'+apps.map(function(a){
        var tone = a.status==='approved' ? 'purchase' : a.status==='rejected' ? '' : 'conversation';
        var ic = a.status==='approved' ? I.check : a.status==='rejected' ? I.x : I.q;
        var badge = a.status==='approved' ? '<span class="badge green">Approved</span>'
          : a.status==='rejected' ? '<span class="badge red">Rejected</span>'
          : '<span class="badge amber">Pending</span>';
        var when = a.reviewedAt ? CRM.relDate(a.reviewedAt) : 'Pending review';
        var who = a.reviewedBy ? (CRM.esc(a.requestedBy)+' → '+CRM.esc(a.reviewedBy)) : CRM.esc(a.requestedBy)+' → awaiting reviewer';
        return '<div class="tl-item '+tone+'"><div class="dot">'+ic+'</div>'+
          '<div class="ct"><div class="t">'+who+' '+badge+'</div>'+
          (a.comment?'<div class="d">'+CRM.esc(a.comment)+'</div>':'')+
          '<div class="when">'+CRM.esc(when)+'</div></div></div>';
      }).join('')+'</div>';
    }
    return card('Activity log & approval history', body, { span:true, icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' });
  }

  // ---- wire up actions ----
  function wire(){
    root.querySelectorAll('[data-act]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var act = btn.getAttribute('data-act');
        if(act==='approve'){
          try{
            S.approveCampaign(cid, 'You');
            CRM.toast('Campaign approved — ready to schedule.');
            render();
          }catch(err){ CRM.toast(err.message || 'Could not approve campaign.'); }
        } else if(act==='schedule'){
          try{
            S.scheduleCampaign(cid);
            CRM.toast('Campaign scheduled / activated.');
            render();
          }catch(err){ CRM.toast(err.message || 'Could not schedule campaign.'); }
        } else if(act==='edit'){
          CRM.toast('Opening Campaign Studio…');
          setTimeout(function(){ location.href = 'campaign-new.html?id=' + encodeURIComponent(cid); }, 600);
        } else if(act==='pause'){
          S.getCampaignById(cid).status = 'paused';
          CRM.toast('Campaign paused — no more sends until you resume.');
          render();
        } else if(act==='resume'){
          S.getCampaignById(cid).status = 'active';
          CRM.toast('Campaign resumed.');
          render();
        } else if(act==='duplicate'){
          CRM.toast('Opening Campaign Studio with this campaign as a starting point…');
          setTimeout(function(){ location.href = 'campaign-new.html?prompt=' + encodeURIComponent(camp.name); }, 600);
        }
      });
    });
  }

  function cap(s){ return s ? String(s).charAt(0).toUpperCase()+String(s).slice(1) : s; }

  render();
})();
</script>
</body>
</html>

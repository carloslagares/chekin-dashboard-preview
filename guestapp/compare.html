<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chekin Guest App — 4.7 vs Opus 4.8</title>
<link rel="stylesheet" href="../ds/colors_and_type.css">
<style>
  :root{--blue:#385CF8;--ink:#161643;--ink2:#6B6B95;--line:#E5E6EE;--bg:#F6F7FC}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);font-family:var(--font-primary);color:var(--ink)}
  .bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:999px;padding:5px;display:flex;gap:3px;align-items:center;box-shadow:0 8px 24px rgba(56,92,248,.12),0 2px 4px rgba(22,22,67,.05)}
  .bar button{appearance:none;border:none;background:transparent;padding:8px 16px;border-radius:999px;cursor:pointer;font:600 12.5px var(--font-primary);color:var(--ink2);display:flex;align-items:center;gap:8px;transition:.15s}
  .bar button:hover{color:var(--ink);background:rgba(56,92,248,.06)}
  .bar button.active{background:var(--blue);color:#fff;box-shadow:0 0 0 3px rgba(56,92,248,.2)}
  .bar button .v{font:700 10px var(--font-primary);padding:1px 6px;border-radius:999px;background:rgba(22,22,67,.08);color:var(--ink2)}
  .bar button.active .v{background:rgba(255,255,255,.25);color:#fff}
  .bar .sep{width:1px;height:22px;background:var(--line);margin:0 4px}
  .stage{height:100vh;width:100%}
  .stage.split{display:grid;grid-template-columns:1fr 1fr}
  .col{position:relative;height:100vh;overflow:hidden;border-right:1px solid var(--line)}
  .col:last-child{border-right:none}
  .col .tag{position:absolute;top:12px;left:12px;z-index:10;font:700 11px var(--font-primary);letter-spacing:.04em;text-transform:uppercase;color:#fff;background:rgba(22,22,67,.82);padding:5px 11px;border-radius:999px;backdrop-filter:blur(4px)}
  .col .tag.b{background:rgba(56,92,248,.92)}
  iframe{width:100%;height:100%;border:none;display:block;background:var(--bg)}
  .mode-single .col{border:none}
</style>
</head>
<body>

<div class="bar" role="tablist">
  <button data-mode="split" class="active"><span class="v">⇆</span>Side by side</button>
  <div class="sep"></div>
  <button data-mode="v47"><span class="v">4.7</span>Original</button>
  <button data-mode="v48"><span class="v">4.8</span>Refined</button>
</div>

<div class="stage split" id="stage">
  <div class="col"><span class="tag">Guest App · 4.7</span><iframe src="index.html" title="4.7"></iframe></div>
  <div class="col"><span class="tag b">Guest App · Opus 4.8</span><iframe src="opus48/index.html" title="4.8"></iframe></div>
</div>

<script>
  var stage = document.getElementById('stage');
  var SRC = { v47:'index.html', v48:'opus48/index.html' };
  document.querySelectorAll('.bar button').forEach(function(b){ b.addEventListener('click', function(){
    document.querySelectorAll('.bar button').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    var m = b.dataset.mode;
    if (m === 'split'){
      stage.className = 'stage split';
      stage.innerHTML = '<div class="col"><span class="tag">Guest App · 4.7</span><iframe src="'+SRC.v47+'"></iframe></div>'+
                        '<div class="col"><span class="tag b">Guest App · Opus 4.8</span><iframe src="'+SRC.v48+'"></iframe></div>';
    } else {
      stage.className = 'stage single mode-single';
      stage.innerHTML = '<div class="col"><iframe src="'+SRC[m]+'"></iframe></div>';
    }
  }); });
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chekin Guest App · V6 · Personalized Trip Guide</title>
<meta name="description" content="Chekin Guest App V6 — Personalized Trip Guide. Choose Desktop or Mobile. Same V5 design, refined UX, three trip stages: arrival/check-in, in-stay, departure/check-out.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161643;--ink2:#6B6B95;--ink3:#9696B9;--line:#E5E6EE;--bg:#F6F7FC;
    --blue:#385BF8;--blue-light:#EFF6FF;--blue-chip:#F0F3FF;--success:#0F9F80;
    --font-primary:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font-primary);color:var(--ink);overflow:hidden}

  /* Same grouped dropdown switcher as the Dashboard / GuestApp */
  .switcher{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:100}
  .trigger{appearance:none;cursor:pointer;display:flex;align-items:center;gap:10px;height:44px;padding:0 8px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:999px;box-shadow:0 8px 24px rgba(56,92,248,.12),0 2px 4px rgba(22,22,67,.04);font:600 13px var(--font-primary);color:var(--ink);transition:box-shadow .15s}
  .trigger:hover{box-shadow:0 10px 28px rgba(56,92,248,.18),0 2px 4px rgba(22,22,67,.06)}
  .trigger .cur-v{font:700 10px var(--font-primary);padding:3px 8px;border-radius:999px;background:var(--blue);color:#fff}
  .trigger .cur-icon{font-size:14px}
  .trigger .cur-label{padding:0 2px}
  .trigger .gen{font:800 9px var(--font-primary);padding:2px 7px;border-radius:5px;letter-spacing:.06em;background:#D5F5EC;color:var(--success)}
  .trigger .chev{width:16px;height:16px;stroke:var(--ink2);fill:none;stroke-width:2;margin-right:6px;transition:transform .2s}
  .switcher.open .trigger .chev{transform:rotate(180deg)}

  .menu{position:absolute;top:52px;left:50%;transform:translateX(-50%) translateY(-6px);width:288px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 40px rgba(22,22,67,.16),0 2px 6px rgba(22,22,67,.06);padding:8px;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .16s,transform .16s,visibility .16s}
  .switcher.open .menu{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .menu .group{display:flex;align-items:center;gap:8px;padding:10px 10px 6px;font:700 10px var(--font-primary);text-transform:uppercase;letter-spacing:.08em;color:var(--ink3)}
  .menu .group .pill{font:800 9px var(--font-primary);padding:2px 7px;border-radius:5px;letter-spacing:.06em;background:#D5F5EC;color:var(--success)}
  .menu .group .ln{flex:1;height:1px;background:var(--line)}
  .opt{width:100%;appearance:none;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;font:600 13.5px var(--font-primary);color:var(--ink);text-align:left;transition:background .12s}
  .opt:hover{background:var(--blue-chip)}
  .opt .ic{width:30px;height:30px;border-radius:8px;background:var(--blue-chip);display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .opt .t{flex:1;min-width:0;line-height:1.25}
  .opt .t small{display:block;font:500 10.5px var(--font-primary);color:var(--ink2)}
  .opt .check{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2.6;opacity:0}
  .opt.active{background:var(--blue-light)}
  .opt.active .ic{background:var(--blue);color:#fff}
  .opt.active .check{opacity:1}

  .back{position:fixed;top:14px;left:14px;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;padding:7px 12px 7px 8px;font:600 12px var(--font-primary);color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(56,92,248,.1)}
  .back:hover{background:#fff}
  .back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

  .stage{position:relative;height:100vh;width:100%}
  iframe.variant{width:100%;height:100vh;border:none;display:none;background:var(--bg)}
  iframe.variant.active{display:block}
</style>
</head>
<body>

<a class="back" href="../"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>All versions</a>

<div class="switcher" id="switcher">
  <button class="trigger" id="trigger" aria-haspopup="menu" aria-expanded="false">
    <span class="cur-v">V6</span>
    <span class="cur-icon" id="curIcon">🖥️</span>
    <span class="cur-label" id="curLabel">Desktop</span>
    <span class="gen">4.8</span>
    <svg class="chev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
  </button>

  <div class="menu" id="menu" role="menu">
    <div class="group"><span class="pill">V6</span>Personalized Trip Guide<span class="ln"></span></div>
    <button class="opt active" data-v="desktop" role="menuitem">
      <span class="ic">🖥️</span>
      <span class="t">Desktop<small>Web layout · 3 trip stages</small></span>
      <svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
    </button>
    <button class="opt" data-v="mobile" role="menuitem">
      <span class="ic">📱</span>
      <span class="t">Mobile<small>PWA phone deck · refined UX</small></span>
      <svg class="check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
    </button>
  </div>
</div>

<div class="stage">
  <iframe class="variant active" data-v="desktop" src="../variants/v6_desktop.html" title="V6 Desktop"></iframe>
  <iframe class="variant" data-v="mobile" data-src="../variants/v6_itinerary.html?mode=mobile" title="V6 Mobile"></iframe>
</div>

<script>
  var switcher = document.getElementById('switcher');
  var trigger  = document.getElementById('trigger');
  var menu     = document.getElementById('menu');
  var curIcon  = document.getElementById('curIcon');
  var curLabel = document.getElementById('curLabel');
  var LS = 'chekin_tripguide_v6_view';
  var ICON = { desktop:'🖥️', mobile:'📱' };

  function openMenu(){ switcher.classList.add('open'); trigger.setAttribute('aria-expanded','true'); }
  function closeMenu(){ switcher.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); }
  trigger.addEventListener('click', function(e){ e.stopPropagation(); switcher.classList.contains('open') ? closeMenu() : openMenu(); });
  document.addEventListener('click', function(e){ if(!switcher.contains(e.target)) closeMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });

  function activate(v){
    var opt = menu.querySelector('.opt[data-v="'+v+'"]');
    if(!opt) return;
    menu.querySelectorAll('.opt').forEach(function(o){ o.classList.toggle('active', o===opt); });
    document.querySelectorAll('iframe.variant').forEach(function(f){
      var match = f.dataset.v === v;
      f.classList.toggle('active', match);
      if (match && !f.getAttribute('src') && f.dataset.src) f.setAttribute('src', f.dataset.src);
    });
    curIcon.textContent = ICON[v] || '🖥️';
    curLabel.textContent = v.charAt(0).toUpperCase() + v.slice(1);
    try{ localStorage.setItem(LS, v); }catch(err){}
  }
  menu.querySelectorAll('.opt').forEach(function(o){ o.addEventListener('click', function(){ activate(o.dataset.v); closeMenu(); }); });

  // initial: ?view=desktop|mobile  >  saved  >  auto (mobile on small screens)
  var urlView = new URLSearchParams(location.search).get('view');
  var saved = null; try{ saved = localStorage.getItem(LS); }catch(err){}
  var auto = window.matchMedia('(max-width:820px)').matches ? 'mobile' : 'desktop';
  var initial = (urlView==='desktop'||urlView==='mobile') ? urlView
              : (saved==='desktop'||saved==='mobile') ? saved : auto;
  activate(initial);
</script>
</body>
</html>
